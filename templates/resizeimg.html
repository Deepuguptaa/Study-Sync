{% extends "base.html" %}

{% block title %}SyncSphere | Image Resizer{% endblock %}

{% block content %}
<div class="text-center mb-12">
    <h1 class="text-4xl md:text-5xl font-bold mb-4 gradient-text">Smart Image Resizer</h1>
    <p class="text-xl text-gray-400 max-w-2xl mx-auto">Resize images perfectly while maintaining optimum quality and detail.</p>
</div>

<div class="max-w-2xl mx-auto">
    <div class="glass-panel rounded-2xl p-8 hover-scale transition-all duration-300">
        <div class="flex items-center justify-center mb-8">
            <div class="w-16 h-16 rounded-full bg-teal-900/40 flex items-center justify-center">
                <i class="fas fa-compress-arrows-alt text-3xl text-teal-400"></i>
            </div>
        </div>
        
        <form id="resizeForm" class="space-y-6">
            <div class="border-2 border-dashed border-gray-600 rounded-xl p-8 text-center hover:border-teal-500 transition-colors cursor-pointer relative overflow-hidden group">
                <input type="file" id="imageFile" name="image" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" required>
                <i class="fas fa-expand text-4xl text-gray-500 mb-3 group-hover:text-teal-400 transition-colors"></i>
                <p class="text-md text-gray-300">Select Image to Resize</p>
                <p id="fileName" class="text-sm text-teal-400 mt-2 font-medium"></p>
            </div>
            
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Width (px)</label>
                    <input type="number" name="width" min="1" value="800" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-all" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Height (px)</label>
                    <input type="number" name="height" min="1" value="600" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-all" required>
                </div>
            </div>

            <button type="submit" class="w-full py-4 rounded-xl bg-gradient-to-r from-teal-600 to-emerald-600 text-white font-bold text-lg shadow-lg hover:shadow-teal-500/30 tool-btn flex justify-center items-center">
                <span>Resize Image</span>
                <div class="loader ml-3 hidden" id="loader"></div>
            </button>
            
            <p id="statusMsg" class="text-center mt-4 hidden font-medium"></p>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('imageFile').addEventListener('change', function(e) {
        document.getElementById('fileName').textContent = e.target.files.length > 0 ? e.target.files[0].name : '';
    });

    document.getElementById('resizeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const loader = document.getElementById('loader');
        const status = document.getElementById('statusMsg');
        
        loader.classList.remove('hidden');
        status.classList.add('hidden');
        status.className = 'text-center mt-4';
        
        try {
            const formData = new FormData(form);
            const response = await fetch('/api/resize_image', {
                method: 'POST',
                body: formData
            });
            
            if (response.ok) {
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                
                const contentDisposition = response.headers.get('Content-Disposition');
                let filename = 'resized-image.jpg';
                if (contentDisposition) {
                    const filenameMatch = contentDisposition.match(/filename="?([^"]+)"?/);
                    if (filenameMatch && filenameMatch.length === 2) filename = filenameMatch[1];
                }
                
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                
                status.textContent = "Success! Image downloaded.";
                status.classList.add('text-green-400', 'block');
                status.classList.remove('hidden');
                
                form.reset();
                document.getElementById('fileName').textContent = '';
            } else {
                const error = await response.json();
                status.textContent = error.error || "An error occurred.";
                status.classList.add('text-red-400', 'block');
                status.classList.remove('hidden');
            }
        } catch (error) {
            status.textContent = "Network error occurred.";
            status.classList.add('text-red-400', 'block');
            status.classList.remove('hidden');
        } finally {
            loader.classList.add('hidden');
        }
    });
</script>
{% endblock %}
